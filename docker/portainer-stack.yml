# NanoVNAWeb — Portainer / one-host stack.
#
# Drop-in compose file for self-hosters: pulls the prebuilt image from
# GHCR instead of building locally, so it works as a Portainer "Stack"
# (Web editor → paste → Deploy) with no source checkout on the host.
#
# Override the host port with the NVW_PORT env var (Portainer Stacks
# UI → "Environment variables").
#
# ⚠  Web Serial requires a *secure context* — http://localhost or
#   https://your.host. On a LAN IP the Connect button will be inert.
#   Put this behind a reverse proxy that terminates TLS for remote use.

services:
  web:
    image: ghcr.io/techniker/nanovnaweb:latest
    container_name: nanovnaweb
    restart: unless-stopped
    ports:
      - "${NVW_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Mirrors the hardening of the source-build compose file: the
    # runtime is a pure static server, so no writable layers and no
    # elevated capabilities beyond what nginx needs to bind :80 and
    # drop privileges.
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
