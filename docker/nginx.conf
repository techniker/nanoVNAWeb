# nginx config for the nanoVNAWeb SPA.
#
# Two things matter for a Vite + vite-plugin-pwa build:
#   1. Client-side routing — any unknown path must fall through to
#      /index.html so React Router (or equivalent) can handle it.
#   2. Cache strategy — Vite emits hashed asset filenames under /assets/
#      (safe to cache forever); the service worker and manifest must
#      NEVER be long-cached or the app gets stuck on an old version.

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Compression for text assets. Images and wasm compress poorly and
    # are usually already compressed, so keep the type list tight.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # Security + behavior headers. Relaxed enough to not break Web Serial
    # (which needs a secure context — deploy behind HTTPS if you're not
    # on localhost) while still sane for a read-only static app.
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header Referrer-Policy         "no-referrer"      always;

    # ---------- Caching rules ----------

    # Hashed build assets under /assets/ are immutable — their name
    # changes when their content changes, so a 1-year cache is safe and
    # dramatically reduces repeat-visit bandwidth.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The service worker must always be revalidated. If a browser
    # caches sw.js, users get stuck on a stale app until they manually
    # clear storage. Workbox chunks carry their own hash so they're
    # fine to cache, but the registration entrypoint (sw.js) is a
    # stable name and must hit the network every time.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires -1;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires -1;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type  "application/manifest+json";
    }

    # ---------- SPA fallback ----------
    # Anything that isn't a real file falls through to index.html. This
    # is what lets deep-linked client routes work on a cold refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Quiet liveness endpoint for reverse proxies / Kubernetes probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
