# Build and publish the NanoVNAWeb container image to GHCR.
#
# Triggers
#   - push to main          → tags `latest`, `main`, `sha-<short>`
#   - push of `v*` tag      → tags `vX.Y.Z`, `X.Y`, `latest`
#   - manual dispatch       → tags `sha-<short>` (useful for ad-hoc rebuilds)
#
# The resulting image is published as
#   ghcr.io/techniker/nanovnaweb:<tag>
#
# Multi-arch (linux/amd64 + linux/arm64) so it runs on x86 hosts and on
# Raspberry Pi / ARM-based Portainer endpoints. The Dockerfile uses
# `--platform=$BUILDPLATFORM` for the Node build stage, so the heavy
# pnpm + Vite build always runs natively on the amd64 runner; only the
# small final nginx layer is cross-built. That keeps wall-clock build
# time bounded even with QEMU in the mix.
#
# Security note: this workflow does not interpolate any user-controlled
# event payload (issue/PR titles, commit messages, head_ref, …) into
# shell `run:` commands. All `${{ }}` expansions feed into typed action
# inputs or env vars defined at the workflow level.

name: docker-publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase to match GHCR's namespace rules. `github.repository`
  # would yield `techniker/nanoVNAWeb`, which OCI registries reject for
  # the capital `V`.
  IMAGE_NAME: techniker/nanovnaweb

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=NanoVNAWeb
            org.opencontainers.image.description=Browser-based control and measurement app for NanoVNA vector network analyzers.
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/techniker/nanoVNAWeb

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
